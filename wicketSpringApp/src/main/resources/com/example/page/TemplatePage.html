<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="utf-8" />
    <title>Wicket Application</title>
    <link rel="stylesheet" type="text/css" href="static/css/bootstrap.min.css" />
    <style>
        /* Add padding so content doesn't hide under the fixed bars */
        body {
            padding-top: 70px;    /* Height of your header */
            padding-bottom: 60px; /* Height of your footer */
            background-color: #f8f9fa;
        }
        
        .footer-container {
            height: 50px;
            line-height: 50px; /* Vertically centers text */
            background-color: #ffffff;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <!-- Header Fixed at Top -->
    <header class="fixed-top shadow-sm" wicket:id="headerPanel">
        <!-- Ensure your HeaderPanel HTML uses <nav class="navbar..."> -->
    </header>
    
     <!-- Breadcrumb placeholder -->
    <div wicket:id="breadcrumb"></div>

    <!-- Content Area (Scrollable) -->
    <main class="container my-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <wicket:child /> 
            </div>
        </div>
    </main>

    <!-- Footer Fixed at Bottom -->
    <footer class="fixed-bottom footer-container text-center" wicket:id="footerPanel">
        <div class="container text-muted">
            © 2026 My Wicket App
        </div>
    </footer>
</body>
</html>
