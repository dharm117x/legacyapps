<wicket:panel>
    <nav aria-label="breadcrumb">
        <!-- breadcrumb class handles horizontal layout and separators (/) -->
        <ul class="breadcrumb bg-light p-2 px-3 rounded border shadow-sm mb-3">
            <li wicket:id="crumbs">
                <!-- text-primary ensures the link is blue -->
                <a wicket:id="link" class="text-primary text-decoration-none">
                    <span wicket:id="label"></span>
                </a>
            </li>
        </ul>
    </nav>
</wicket:panel>
